syntax = "proto3";

package screencapture;

service ScreenCaptureService {
  // The Client registers here and listens for commands
  rpc ConnectAgent(AgentRegistration) returns (stream CaptureCommand);
  // The Client uploads the requested screenshot here
  rpc SubmitScreenshot(ScreenshotResponse) returns (SubmitAck);
}

message AgentRegistration {
  string agent_id = 1; // "laptop-1"
  int32 monitor_count = 2; // Number of connected screens
}

message CaptureCommand {
  string command_id = 1; // A correlation ID (UUID)
  int32 monitor_idx = 2; // Which screen to capture
}

message ScreenshotResponse {
  string command_id = 1;
  bytes image_data = 2;
  bool success = 3;
  string error_message = 4;
}

message SubmitAck {
  bool received = 1;
}
